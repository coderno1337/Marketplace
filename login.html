<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      background: radial-gradient(circle at center, #1e1e1e 0%, #121212 100%);
    }

    .form-signin {
      max-width: 400px;
      padding: 1rem;
    }
  </style>
</head>

<body class="text-center">

  <main class="form-signin w-100 m-auto">
    <form>
      <div class="mb-4">
        <a href="index.html" class="text-decoration-none text-primary fs-1">
          <i class="bi bi-disc-fill"></i>
        </a>
      </div>
      <h1 class="h3 mb-3 fw-bold text-light">Sign In to Marketplace</h1>

      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
        <label for="floatingInput" class="text-secondary">Email address</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
        <label for="floatingPassword" class="text-secondary">Password</label>
      </div>

      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" value="remember-me" id="flexCheckDefault">
        <label class="form-check-label text-secondary" for="flexCheckDefault">
          Remember me
        </label>
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" type="button" onclick="window.location.href='index.html'">Sign
        in</button>

      </p>
      <p class="mt-5 mb-3 text-secondary">&copy; 2026 Marketplace</p>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
